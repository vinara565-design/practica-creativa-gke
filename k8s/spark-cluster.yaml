apiVersion: v1
kind: Service
metadata:
  name: spark-master-svc
  labels:
    app: spark-master
spec:
  ports:
    - port: 7077
      targetPort: 7077
      name: cluster
    - port: 8080
      targetPort: 8080
      name: webui
  selector:
    app: spark-master
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-master
  labels:
    app: spark-master
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-master
  template:
    metadata:
      labels:
        app: spark-master
    spec:
      containers:
        - name: spark-master
          image: villa823/spark-base:4.1.1
          imagePullPolicy: IfNotPresent
          args: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
          ports:
            - containerPort: 7077
              name: cluster
            - containerPort: 8080
              name: webui
          resources:
            limits:
              memory: "1Gi"
              cpu: "1"
            requests:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-worker
  labels:
    app: spark-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spark-worker
  template:
    metadata:
      labels:
        app: spark-worker
    spec:
      containers:
        - name: spark-worker
          image: villa823/spark-base:4.1.1
          imagePullPolicy: IfNotPresent
          # Ahora los workers apuntan al nuevo nombre del servicio corregido
          args: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark-master-svc:7077"]
          ports:
            - containerPort: 8081
              name: webui
          resources:
            limits:
              memory: "1.5Gi"
              cpu: "1"
            requests:
              memory: "1Gi"
              cpu: "500m"
