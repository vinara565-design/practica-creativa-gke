apiVersion: v1
kind: Service
metadata:
  name: cassandra
  labels:
    app: cassandra
spec:
  ports:
  - port: 9042
    targetPort: 9042
  selector:
    app: cassandra
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cassandra
  labels:
    app: cassandra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cassandra
  template:
    metadata:
      labels:
        app: cassandra
    spec:
      containers:
      - name: cassandra
        image: cassandra:4.1
        ports:
        - containerPort: 9042
        env:
        - name: CASSANDRA_CLUSTER_NAME
          value: "TestCluster"
        - name: MAX_HEAP_SIZE
          value: "512M"
        - name: HEAP_NEWSIZE
          value: "128M"
        resources:
          limits:
            memory: "1.5Gi"
            cpu: "1"
          requests:
            memory: "1Gi"
            cpu: "500m"
        # : Montamos el disco duro en la ruta de datos
        volumeMounts:
        - name: cassandra-storage
          mountPath: /var/lib/cassandra
      # : Declaramos el volumen
      volumes:
      - name: cassandra-storage
        persistentVolumeClaim:
          claimName: cassandra-pvc
---
# La reclamación del disco duro (PVC) de 2GB
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cassandra-pvc
  labels:
    app: cassandra
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi