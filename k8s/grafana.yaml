# ============================================================
# ConfigMap 1: Datasource de Prometheus (se carga automáticamente)
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-svc:9090
        isDefault: true
        editable: false
---
# ============================================================
# ConfigMap 2: Dashboard de la práctica (Big Data Pipeline)
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-config
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'practica'
        orgId: 1
        folder: 'Practica Creativa'
        type: file
        disableDeletion: true
        updateIntervalSeconds: 10
        options:
          path: /var/lib/grafana/dashboards
---
# ============================================================
# ConfigMap 3: El dashboard JSON de la práctica
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-practica
data:
  practica.json: |
    {
      "title": "Big Data Pipeline - Practica Creativa",
      "uid": "practica-main",
      "version": 1,
      "refresh": "10s",
      "schemaVersion": 38,
      "panels": [
        {
          "id": 1,
          "title": "Pods Running",
          "type": "stat",
          "gridPos": {"h": 4, "w": 4, "x": 0, "y": 0},
          "targets": [{
            "expr": "count(kube_pod_status_phase{phase=\"Running\", namespace=\"default\"})",
            "legendFormat": "Pods activos",
            "datasource": {"type": "prometheus", "uid": "prometheus"}
          }],
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "reduceOptions": {"calcs": ["lastNotNull"]}
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": 0},
                  {"color": "yellow", "value": 8},
                  {"color": "green", "value": 10}
                ]
              },
              "color": {"mode": "thresholds"}
            }
          }
        },
        {
          "id": 2,
          "title": "CPU Usage por Pod (namespace default)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 4, "y": 0},
          "targets": [{
            "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"default\", container!=\"\", container!=\"POD\"}[2m])) by (pod)",
            "legendFormat": "{{pod}}",
            "datasource": {"type": "prometheus", "uid": "prometheus"}
          }],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "color": {"mode": "palette-classic"}
            }
          }
        },
        {
          "id": 3,
          "title": "RAM Usage por Pod (namespace default)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 0},
          "targets": [{
            "expr": "sum(container_memory_working_set_bytes{namespace=\"default\", container!=\"\", container!=\"POD\"}) by (pod)",
            "legendFormat": "{{pod}}",
            "datasource": {"type": "prometheus", "uid": "prometheus"}
          }],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "color": {"mode": "palette-classic"}
            }
          }
        },
        {
          "id": 4,
          "title": "Estado de todos los Pods",
          "type": "table",
          "gridPos": {"h": 8, "w": 4, "x": 0, "y": 4},
          "targets": [{
            "expr": "kube_pod_status_phase{namespace=\"default\"}",
            "legendFormat": "{{pod}} - {{phase}}",
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "instant": true,
            "format": "table"
          }],
          "transformations": [
            {"id": "organize", "options": {
              "excludeByName": {"Time": true, "__name__": true, "job": true, "instance": true},
              "renameByName": {"pod": "Pod", "phase": "Estado", "Value": "Activo"}
            }}
          ]
        },
        {
          "id": 5,
          "title": "Spark Workers Registrados",
          "type": "stat",
          "gridPos": {"h": 4, "w": 4, "x": 0, "y": 8},
          "targets": [{
            "expr": "count(kube_pod_status_phase{phase=\"Running\", namespace=\"default\", pod=~\"spark-worker.*\"})",
            "legendFormat": "Workers",
            "datasource": {"type": "prometheus", "uid": "prometheus"}
          }],
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "reduceOptions": {"calcs": ["lastNotNull"]}
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": 0},
                  {"color": "green", "value": 1}
                ]
              },
              "color": {"mode": "thresholds"}
            }
          }
        },
        {
          "id": 6,
          "title": "Red - Bytes recibidos por Pod",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 4, "y": 8},
          "targets": [{
            "expr": "sum(rate(container_network_receive_bytes_total{namespace=\"default\"}[2m])) by (pod)",
            "legendFormat": "{{pod}}",
            "datasource": {"type": "prometheus", "uid": "prometheus"}
          }],
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "color": {"mode": "palette-classic"}
            }
          }
        },
        {
          "id": 7,
          "title": "Reinicios de Pods (últimas 24h)",
          "type": "bargauge",
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 8},
          "targets": [{
            "expr": "kube_pod_container_status_restarts_total{namespace=\"default\"}",
            "legendFormat": "{{pod}}",
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "instant": true
          }],
          "options": {
            "orientation": "horizontal",
            "reduceOptions": {"calcs": ["lastNotNull"]}
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": 0},
                  {"color": "yellow", "value": 1},
                  {"color": "red", "value": 3}
                ]
              },
              "color": {"mode": "thresholds"}
            }
          }
        }
      ],
      "time": {"from": "now-30m", "to": "now"},
      "timepicker": {}
    }
---
# ============================================================
# PVC - Persistencia del disco de Grafana
# ============================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard-rwo
  resources:
    requests:
      storage: 1Gi
---
# ============================================================
# Deployment de Grafana con los 3 ConfigMaps montados
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        fsGroup: 472
      initContainers:
      - name: init-dashboards-dir
        image: busybox
        command: ["sh", "-c", "mkdir -p /var/lib/grafana/dashboards && cp /tmp/dashboards/*.json /var/lib/grafana/dashboards/ && chown -R 472:472 /var/lib/grafana"]
        volumeMounts:
        - name: grafana-storage
          mountPath: /var/lib/grafana
        - name: dashboard-practica
          mountPath: /tmp/dashboards
      containers:
      - name: grafana
        image: grafana/grafana:10.4.0
        ports:
        - containerPort: 3000
        resources:
          limits:
            memory: "512Mi"
          requests:
            memory: "256Mi"
        env:
        - name: GF_SECURITY_ADMIN_USER
          value: "admin"
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: "admin"
        - name: GF_USERS_ALLOW_SIGN_UP
          value: "false"
        - name: GF_PATHS_PROVISIONING
          value: "/etc/grafana/provisioning"
        volumeMounts:
        - name: grafana-storage
          mountPath: /var/lib/grafana
        - name: grafana-datasources
          mountPath: /etc/grafana/provisioning/datasources
        - name: grafana-dashboards-config
          mountPath: /etc/grafana/provisioning/dashboards
      volumes:
      - name: grafana-storage
        persistentVolumeClaim:
          claimName: grafana-pvc
      - name: grafana-datasources
        configMap:
          name: grafana-datasources
      - name: grafana-dashboards-config
        configMap:
          name: grafana-dashboards-config
      - name: dashboard-practica
        configMap:
          name: grafana-dashboard-practica
---
# ============================================================
# Service - IP pública de Grafana
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: grafana-svc
spec:
  type: LoadBalancer
  ports:
  - port: 3000
    targetPort: 3000
  selector:
    app: grafana