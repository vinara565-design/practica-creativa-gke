apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-ui
  labels:
    app: kafka-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-ui
  template:
    metadata:
      labels:
        app: kafka-ui
    spec:
      containers:
      - name: kafka-ui
        image: provectuslabs/kafka-ui:latest
        ports:
        - containerPort: 8080
        resources:
          limits:
            memory: "256Mi"
        env:
        - name: KAFKA_CLUSTERS_0_NAME
          value: "practica_cluster"
        - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
          value: "kafka:9092" # Aquí pones el nombre de TU servicio de Kafka en K8s
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-ui-svc
spec:
  type: LoadBalancer # Te dará una IP pública en Google Cloud para ver los mensajes de Kafka
  ports:
  - port: 8090
    targetPort: 8080
  selector:
    app: kafka-ui