

services:

  # ─── KAFKA ───────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5
  # ─── MONGODB ─────────────────────────────────────────────
  mongo:
    image: mongo:4.4
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.runCommand({ping:1})"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── CASSANDRA ───────────────────────────────────────────
  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: "practica_cluster"
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 30s
      timeout: 15s
      retries: 10

  # ─── MINIO (Data Lakehouse) ───────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── SPARK MASTER ─────────────────────────────────────────
  spark-master:
    image: spark-base:4.1.1
    container_name: spark-master
    entrypoint: ["/start-master.sh"]
    ports:
      - "8080:8080"
      - "7077:7077"
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_SUBMIT_OPTS: "--add-opens=java.base/sun.util.calendar=ALL-UNNAMED"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 15s
      timeout: 10s
      retries: 5
    #volumes:
   #   - ./models:/models

  # ─── SPARK WORKER 1 ───────────────────────────────────────
  spark-worker-1:
    image: spark-base:4.1.1
    container_name: spark-worker-1
    entrypoint: ["/start-worker.sh"]
    ports:
      - "8081:8081"
    environment:
      SPARK_WORKER_MEMORY: 1G
      SPARK_WORKER_CORES: 1
   #   SPARK_SUBMIT_OPTS: "--add-opens=java.base/sun.util.calendar=ALL-UNNAMED"
    depends_on:
      spark-master:
        condition: service_healthy
    volumes:
      - ./models:/home/upm/practica_creativa/models

  # ─── SPARK WORKER 2 ───────────────────────────────────────
  spark-worker-2:
    image: spark-base:4.1.1
    container_name: spark-worker-2
    entrypoint: ["/start-worker.sh"]
    ports:
      - "8082:8081"
    environment:
      SPARK_WORKER_MEMORY: 1G
      SPARK_WORKER_CORES: 1
     # SPARK_SUBMIT_OPTS: "--add-opens=java.base/sun.util.calendar=ALL-UNNAMED"
    depends_on:
      spark-master:
        condition: service_healthy
    volumes:
      - ./models:/home/upm/practica_creativa/models

  # ─── FLASK WEB APP ────────────────────────────────────────
  flask:
    image: flask-app:latest
    container_name: flask
    ports:
      - "5001:5001"
    environment:
      PROJECT_HOME: /app
      MONGO_URI: mongodb://mongo:27017
      KAFKA_BROKERS: kafka:9092
      CASSANDRA_HOST: cassandra
    depends_on:
      mongo:
        condition: service_healthy
      kafka:
        condition: service_healthy
      cassandra:
        condition: service_healthy
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.flask

  # ─── SPARK SUBMIT (predictor) ─────────────────────────────
  spark-submit:
    image: spark-base:4.1.1
    container_name: spark-submit
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        spark-submit \
          --class es.upm.dit.ging.predictor.MakePrediction \
          --master spark://spark-master:7077 \
          --deploy-mode cluster \
          --packages org.mongodb.spark:mongo-spark-connector_2.13:10.4.1,org.apache.spark:spark-sql-kafka-0-10_2.13:4.1.1 \
          --conf spark.hadoop.fs.s3a.endpoint=http://minio:9000 \
          --conf spark.hadoop.fs.s3a.access.key=minioadmin \
          --conf spark.hadoop.fs.s3a.secret.key=minioadmin \
          --conf spark.hadoop.fs.s3a.path.style.access=true \
          --conf spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem \
          --conf spark.hadoop.fs.s3a.connection.ssl.enabled=false \
          --conf spark.hadoop.fs.s3a.attempts.maximum=3 \
          --conf spark.hadoop.fs.s3a.connection.establish.timeout=5000 \
          --conf spark.hadoop.fs.s3a.connection.timeout=10000 \
          --conf "spark.driver.extraJavaOptions=--add-opens=java.base/sun.util.calendar=ALL-UNNAMED" \
          --conf "spark.executor.extraJavaOptions=--add-opens=java.base/sun.util.calendar=ALL-UNNAMED" \
          s3a://lakehouse/jars/flight_prediction-assembly-0.1.jar
    environment:
      APP_BASE_PATH: s3a://lakehouse
      MONGO_URI: mongodb://mongo:27017
      KAFKA_BROKERS: kafka:9092
      #SPARK_SUBMIT_OPTS: "--add-opens=java.base/sun.util.calendar=ALL-UNNAMED"
    depends_on:
      spark-master:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mongo:
        condition: service_healthy
  #  volumes:
   #   - ./models:/models


  # ─── SPARK TRAINING ───────────────────────────────────────
  spark-training:
    image: spark-base:4.1.1
    container_name: spark-training
    entrypoint: ["/bin/bash", "-c"]
    command:
      - "spark-submit --master spark://spark-master:7077 --conf spark.hadoop.fs.s3a.endpoint=http://minio:9000 --conf spark.hadoop.fs.s3a.access.key=minioadmin --conf spark.hadoop.fs.s3a.secret.key=minioadmin --conf spark.hadoop.fs.s3a.path.style.access=true --conf spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem --conf spark.hadoop.fs.s3a.connection.establish.timeout=60000 --conf spark.hadoop.fs.s3a.connection.timeout=60000 --conf spark.pyspark.python=python3 /app/train_spark_mllib_model.py /app"
    volumes:
      - ./resources/train_spark_mllib_model.py:/app/train_spark_mllib_model.py
      - ./models:/app/models
      - ./data/simple_flight_delay_features.jsonl:/app/data/simple_flight_delay_features.jsonl
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      TRAINING_DATA_PATH: s3a://lakehouse/raw/flights/simple_flight_delay_features.jsonl
      MODELS_PATH: s3a://lakehouse/models
      #SPARK_SUBMIT_OPTS: "--add-opens=java.base/sun.util.calendar=ALL-UNNAMED"
    depends_on:
      spark-master:
        condition: service_healthy
      minio:
        condition: service_healthy
    profiles:
      - training

#El profiles: training significa que este contenedor no arranca por defecto con docker compose up, solo cuando lo llames explícitamente. Así no entrena cada vez que levantas el sistema.

  # ─── MLFLOW ───────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.1
    container_name: mlflow
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root s3://lakehouse/mlflow
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    depends_on:
      minio:
        condition: service_healthy

    # ─── AIRFLOW ──────────────────────────────────────────────
  airflow:
    build:
      context: .
      dockerfile: ./dockerfiles/Dockerfile.airflow
    container_name: airflow
    ports:
      - "8085:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__WORKERS: "1"
      AIRFLOW__WEBSERVER__WORKER_TIMEOUT: "300"
      AIRFLOW__CORE__PARALLELISM: "1"
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      SPARK_MASTER: spark://spark-master:7077
      MLFLOW_TRACKING_URI: http://mlflow:5000
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    volumes:
      - ./resources/airflow:/opt/airflow/dags
      - ./resources/train_spark_mllib_model.py:/opt/airflow/dags/train_spark_mllib_model.py
    command: >
      bash -c "airflow scheduler & exec airflow webserver"
    depends_on:
      - spark-master
      - mlflow

  # ─── PROMETHEUS ───────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-lifecycle'
    mem_limit: "256m"

  # ─── GRAFANA ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    mem_limit: "256m"

  # ─── KAFKA UI ─────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: practica_cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    mem_limit: "256m"
    
  # ─── CADVISOR ───────────────────────────────────────────── dashboard (ID 193) requiere cAdvisor para recopilar métricas de Docker
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
      - "8091:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    command:
      - '--disable_metrics=disk,diskIO,network,tcp,udp,percpu,sched,process'
      - '--housekeeping_interval=30s'
      - '--max_housekeeping_interval=60s'
    mem_limit: "128m"

volumes:
  mongo_data:
  cassandra_data:
  minio_data:
  grafana_data:
